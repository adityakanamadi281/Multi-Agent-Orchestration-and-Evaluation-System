services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - chromadata:/data/chroma

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: uv run python -m arq worker.tasks.WorkerSettings
    env_file: .env
    volumes:
      - chromadata:/data/chroma

  logviewer:
    build:
      context: .
      dockerfile: logviewer/Dockerfile
    depends_on:
      db: { condition: service_healthy }
    command: uv run uvicorn logviewer.app:app --host 0.0.0.0 --port 8001
    ports: ["8001:8001"]
    env_file: .env

volumes:
  pgdata:
  chromadata:
